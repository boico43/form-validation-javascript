<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <style>
        /* Reset general para eliminar márgenes y padding por defecto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Centramos el formulario vertical y horizontalmente en la pantalla */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Tarjeta contenedora del formulario con sombra y bordes redondeados */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        /* Título del formulario centrado */
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Contenedor de cada campo para mantener espaciado uniforme */
        .campo {
            margin-bottom: 1.2rem;
        }

        /* Etiquetas de cada campo */
        .campo label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #444;
            margin-bottom: 0.4rem;
        }

        /* Estilo base de los inputs */
        .campo input {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #222;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        /* Resaltado al enfocar un campo */
        .campo input:focus {
            border-color: #6366f1;
            background: #fff;
        }

        /* Mensajes de error en rojo debajo de cada campo */
        .error {
            color: #e53e3e;
            font-size: 0.78rem;
            margin-top: 0.3rem;
            min-height: 1rem;
        }

        /* Borde rojo en el input cuando hay error */
        input.error-input {
            border: 1.5px solid #e53e3e;
        }

        /* Mensaje de éxito en verde al centro */
        .correcto {
            color: #38a169;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1rem;
        }

        /* Botón de envío con color morado y efecto hover */
        button[type="submit"] {
            width: 100%;
            padding: 0.7rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Formulario de Registro</h2>
    <!-- Formulario con ID para ser referenciado desde JavaScript -->
    <form id="formulario">

        <!-- Campo: Nombre completo -->
        <div class="campo">
            <label>Nombre completo:</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
            <div id="errorNombre" class="error"></div>
        </div>

        <!-- Campo: Correo electrónico -->
        <div class="campo">
            <label>Correo electrónico:</label>
            <input type="text" id="correo" placeholder="correo@ejemplo.com">
            <div id="errorCorreo" class="error"></div>
        </div>

        <!-- Campo: Contraseña -->
        <div class="campo">
            <label>Contraseña:</label>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres">
            <div id="errorPassword" class="error"></div>
        </div>

        <!-- Campo: Confirmación de contraseña -->
        <div class="campo">
            <label>Confirmar contraseña:</label>
            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña">
            <div id="errorConfirm" class="error"></div>
        </div>

        <button type="submit">Enviar</button>
    </form>
    <!-- Mensaje de éxito, visible solo cuando el formulario es válido -->
    <p id="mensajeExito" class="correcto"></p>
</div>
<!-- Archivo JS externo con la lógica de validación -->
<script src="validacion.js"></script>
</body>
</html>
